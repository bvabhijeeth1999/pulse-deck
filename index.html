<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Rotation Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root{
  --bg:#06070d; --panel:rgba(255,255,255,.035); --panel2:rgba(255,255,255,.06);
  --line:rgba(255,255,255,.08); --txt:#e8eaf2; --dim:#8b91a7; --dim2:#5c6177;
  --green:#34d399; --red:#fb7185; --amber:#fbbf24; --cyan:#22d3ee; --violet:#a78bfa;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:'Space Grotesk',sans-serif;overflow-x:hidden;min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}

/* ── animated background ── */
.bg{position:fixed;inset:0;z-index:-2;overflow:hidden}
.bg::after{content:"";position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:56px 56px;mask-image:radial-gradient(ellipse 90% 70% at 50% 0%,#000 30%,transparent 75%)}
.blob{position:absolute;border-radius:50%;filter:blur(110px);opacity:.5;animation:drift 26s ease-in-out infinite alternate}
.b1{width:560px;height:560px;background:#0e7490;top:-220px;left:-120px}
.b2{width:480px;height:480px;background:#7c2d12;top:-160px;right:-100px;animation-delay:-9s}
.b3{width:520px;height:520px;background:#312e81;bottom:-260px;left:34%;animation-delay:-17s}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(70px,50px) scale(1.15)}}

.wrap{max-width:1280px;margin:0 auto;padding:0 22px 90px}

/* ── header ── */
header{display:flex;align-items:center;justify-content:space-between;padding:26px 0 8px;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:13px}
.logo .gem{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-size:20px;
  background:linear-gradient(135deg,#0891b2,#6d28d9);box-shadow:0 0 28px rgba(34,211,238,.4)}
.logo h1{font-size:21px;font-weight:700;letter-spacing:.13em}
.logo h1 span{color:var(--cyan)}
.logo small{display:block;color:var(--dim);font-size:11px;letter-spacing:.28em;font-weight:400}
.stamp{text-align:right;color:var(--dim);font-size:12px}
.stamp .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,.5)}50%{box-shadow:0 0 0 6px rgba(52,211,153,0)}}

/* ── hero ── */
.hero{margin-top:26px;border:1px solid var(--line);border-radius:22px;padding:34px 36px;position:relative;overflow:hidden;
  background:linear-gradient(160deg,rgba(34,211,238,.07),rgba(167,139,250,.05) 45%,rgba(255,255,255,.02))}
.hero .label{color:var(--dim);font-size:12px;letter-spacing:.24em;text-transform:uppercase}
.hero .big{font-size:clamp(42px,6.4vw,72px);font-weight:700;line-height:1.05;margin:8px 0 4px;
  background:linear-gradient(95deg,#fff 25%,#7dd3fc 65%,#c4b5fd);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .sub{color:var(--dim);font-size:13px}
.heroStats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:28px}
.hstat{border:1px solid var(--line);border-radius:14px;padding:14px 16px;background:rgba(0,0,0,.22);backdrop-filter:blur(6px)}
.hstat .k{color:var(--dim);font-size:11px;letter-spacing:.14em;text-transform:uppercase}
.hstat .v{font-size:22px;font-weight:600;margin-top:5px}

/* ── tabs ── */
nav{position:sticky;top:0;z-index:50;display:flex;gap:8px;padding:14px 0;margin-top:28px;
  background:linear-gradient(var(--bg) 78%,transparent);flex-wrap:wrap}
nav button{font-family:inherit;font-size:13.5px;font-weight:600;letter-spacing:.04em;color:var(--dim);
  background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:9px 20px;cursor:pointer;transition:.22s}
nav button:hover{color:var(--txt);background:var(--panel2)}
nav button.on{color:#04060b;background:var(--acc,#22d3ee);border-color:transparent;box-shadow:0 0 22px color-mix(in srgb,var(--acc,#22d3ee) 45%,transparent)}

/* ── cards / grids ── */
.grid{display:grid;gap:16px}
.card{border:1px solid var(--line);border-radius:18px;background:var(--panel);backdrop-filter:blur(8px);padding:20px 22px;position:relative}
.card h3{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:14px;font-weight:600}
.section{display:none;animation:fadein .35s ease}
.section.on{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* overview strategy cards */
.ovGrid{grid-template-columns:repeat(auto-fit,minmax(310px,1fr));margin-top:8px}
.stratCard{cursor:pointer;transition:.25s;overflow:hidden}
.stratCard:hover{transform:translateY(-4px);border-color:color-mix(in srgb,var(--acc) 50%,transparent);box-shadow:0 14px 44px -16px color-mix(in srgb,var(--acc) 40%,transparent)}
.stratCard::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:linear-gradient(90deg,var(--acc),transparent)}
.scTop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.scName{font-size:17px;font-weight:700}
.scMkt{color:var(--dim);font-size:12px;margin-top:2px}
.badge{font-size:10.5px;font-weight:700;letter-spacing:.12em;padding:5px 11px;border-radius:999px;white-space:nowrap}
.badge.onr{background:rgba(52,211,153,.14);color:var(--green);border:1px solid rgba(52,211,153,.4)}
.badge.offr{background:rgba(251,191,36,.13);color:var(--amber);border:1px solid rgba(251,191,36,.4)}
.scNav{font-size:30px;font-weight:700;margin:14px 0 2px}
.scPl{font-size:13.5px;font-weight:600}
.spark{height:54px;margin-top:10px}
.scFoot{display:flex;justify-content:space-between;color:var(--dim);font-size:12px;margin-top:10px}

/* stat chips */
.chips{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:14px 0 18px}
.chip{border:1px solid var(--line);border-radius:13px;padding:12px 14px;background:rgba(0,0,0,.2)}
.chip .k{color:var(--dim);font-size:10.5px;letter-spacing:.13em;text-transform:uppercase}
.chip .v{font-size:19px;font-weight:600;margin-top:4px}

.pos{color:var(--green)} .neg{color:var(--red)} .mut{color:var(--dim)}

/* pipeline */
.pipe{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.pipe .step{border:1px solid var(--line);background:rgba(0,0,0,.25);border-radius:11px;padding:9px 13px;font-size:12.5px}
.pipe .step b{display:block;font-size:10px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px}
.pipe .arr{color:var(--dim2);font-size:15px}

/* tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--dim);font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;text-align:right;padding:8px 10px;border-bottom:1px solid var(--line);font-weight:600}
td{padding:9px 10px;text-align:right;border-bottom:1px solid rgba(255,255,255,.045)}
th:first-child,td:first-child{text-align:left}
tr:hover td{background:rgba(255,255,255,.025)}
.sym{font-weight:700;font-family:'JetBrains Mono',monospace;font-size:12.5px}
.scroll{max-height:420px;overflow:auto}
.scroll::-webkit-scrollbar{width:8px;height:8px}
.scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:8px}

/* trail buffer bars */
.tbRow{display:grid;grid-template-columns:88px 1fr 84px;align-items:center;gap:12px;margin:9px 0}
.tbBar{height:9px;border-radius:6px;background:rgba(255,255,255,.07);overflow:hidden;position:relative}
.tbFill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--red),var(--amber) 35%,var(--green) 70%)}
.tbPct{font-size:12px;text-align:right}

/* ideal vs actual */
.diffWrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.diffCol .t{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-bottom:9px}
.tag{display:inline-block;margin:0 6px 7px 0;padding:6px 12px;border-radius:9px;font-size:12.5px;font-weight:600;font-family:'JetBrains Mono',monospace}
.tag.m{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.35)}
.tag.b{background:rgba(34,211,238,.1);color:var(--cyan);border:1px solid rgba(34,211,238,.35)}
.tag.x{background:rgba(251,113,133,.1);color:var(--red);border:1px solid rgba(251,113,133,.35)}
.tag small{color:var(--dim);font-weight:400;margin-left:5px}

/* regime gauge */
.gaugeRow{display:flex;align-items:center;gap:16px;margin-bottom:8px;flex-wrap:wrap}
.gNum{font-size:34px;font-weight:700}
.gMeta{color:var(--dim);font-size:12.5px;line-height:1.6}

.ec{width:100%}
.note{color:var(--dim2);font-size:11.5px;margin-top:10px;line-height:1.5}
.empty{color:var(--dim);font-size:14px;padding:26px;text-align:center;border:1px dashed var(--line);border-radius:14px;line-height:1.7}
footer{margin-top:60px;color:var(--dim2);font-size:11.5px;text-align:center;line-height:1.8}
@media(max-width:720px){.hero{padding:24px}.card{padding:16px}}
</style>
</head>
<body>
<div class="bg"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
<div class="wrap">
  <header>
    <div class="logo">
      <div class="gem">◈</div>
      <h1>ROTATION<span>ENGINE</span><small>MOMENTUM · REGIME · TRAIL</small></h1>

  <main id="main"></main>

function countUp(el, target, cur) {
  const t0 = performance.now(), dur = 1300, neg = target < 0;
  function step(t) {
    const p = Math.min((t - t0) / dur, 1), e = 1 - Math.pow(1 - p, 3);
    el.textContent = (neg ? "−" : "") + fmtN(target * e, cur);
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

  const rg = document.getElementById("reg-" + s.key);
  if (rg) {
    mkChart(rg, {
      grid: {left: 8, right: 8, top: 16, bottom: 24, containLabel: true},
      tooltip: {trigger: "axis", backgroundColor: "#11131c", borderColor: "rgba(255,255,255,.1)", textStyle: {color: "#e8eaf2", fontSize: 12}},
      xAxis: {type: "category", data: s.regime.series.map(p => p[0]),
        axisLine: {lineStyle: {color: "rgba(255,255,255,.15)"}}, axisLabel: {fontSize: 10}},
      yAxis: {type: "value", scale: true, splitLine: {lineStyle: {color: "rgba(255,255,255,.05)"}}, axisLabel: {fontSize: 10}},
      series: [
        {name: s.benchmark, type: "line", data: s.regime.series.map(p => p[1]), symbol: "none",
         lineStyle: {width: 1.8, color: s.accent}, z: 3},
        {name: "MA", type: "line", data: s.regime.series.map(p => p[2]), symbol: "none",
         lineStyle: {width: 1.4, color: "#a78bfa", type: "dashed"}}]
    });
  }

  /* nav chart */
  const nv = document.getElementById("nav-" + s.key);
  if (nv && s.nav_series.length) {
    const dates = [...new Set(s.nav_series.map(p => p[0]).concat(s.bench_series.map(p => p[0])))].sort();
    const navMap = Object.fromEntries(s.nav_series.map(p => [p[0], p[1]]));
    const depMap = Object.fromEntries(s.nav_series.map(p => [p[0], p[2]]));
    const benMap = Object.fromEntries(s.bench_series.map(p => [p[0], p[1]]));
    mkChart(nv, {
      grid: {left: 8, right: 8, top: 30, bottom: 24, containLabel: true},
      tooltip: {trigger: "axis", backgroundColor: "#11131c", borderColor: "rgba(255,255,255,.1)", textStyle: {color: "#e8eaf2", fontSize: 12}},
      legend: {top: 0, textStyle: {color: "#8b91a7", fontSize: 11}, itemWidth: 14},
      xAxis: {type: "category", data: dates, axisLine: {lineStyle: {color: "rgba(255,255,255,.15)"}}, axisLabel: {fontSize: 10}},
      yAxis: {type: "value", scale: true, splitLine: {lineStyle: {color: "rgba(255,255,255,.05)"}}, axisLabel: {fontSize: 10}},
      series: [
        {name: "Strategy NAV", type: "line", data: dates.map(d => navMap[d] ?? null), connectNulls: true,
         symbol: "none", smooth: true, lineStyle: {width: 2.4, color: s.accent}, z: 4,
         areaStyle: {color: {type: "linear", x: 0, y: 0, x2: 0, y2: 1,
           colorStops: [{offset: 0, color: s.accent + "33"}, {offset: 1, color: s.accent + "00"}]}}},
        {name: "Deployed", type: "line", step: "end", data: dates.map(d => depMap[d] ?? null), connectNulls: true,
         symbol: "none", lineStyle: {width: 1.3, color: "#5c6177", type: "dotted"}},
        ...(s.bench_series.length ? [{name: s.benchmark + " (same cashflows)", type: "line",
          data: dates.map(d => benMap[d] ?? null), connectNulls: true, symbol: "none", smooth: true,
          lineStyle: {width: 1.6, color: "#a78bfa"}}] : [])]
    });
  }

  /* P&L bars + allocation donut */
  const pb = document.getElementById("plbar-" + s.key);
  if (pb) {
    const hh = [...s.holdings].sort((a, b) => a.upl_pct - b.upl_pct);
    mkChart(pb, {
      grid: {left: 8, right: 36, top: 6, bottom: 6, containLabel: true},
      tooltip: {backgroundColor: "#11131c", borderColor: "rgba(255,255,255,.1)", textStyle: {color: "#e8eaf2"},
        formatter: p => `${p.name}: ${p.value >= 0 ? "+" : ""}${p.value}%`},
      xAxis: {type: "value", splitLine: {lineStyle: {color: "rgba(255,255,255,.05)"}}, axisLabel: {fontSize: 10, formatter: "{value}%"}},
      yAxis: {type: "category", data: hh.map(p => p.symbol), axisLabel: {fontSize: 11, fontFamily: "'JetBrains Mono',monospace"}},
      series: [{type: "bar", data: hh.map(p => ({value: p.upl_pct,
        itemStyle: {color: p.upl_pct >= 0 ? "#34d399" : "#fb7185", borderRadius: 4}})),
        barWidth: 13, label: {show: true, position: "right", fontSize: 10, color: "#8b91a7",
          formatter: p => (p.value >= 0 ? "+" : "") + p.value + "%"}}]
    });
  }
  const al = document.getElementById("alloc-" + s.key);
  if (al) {
    const items = s.holdings.map(p => ({name: p.symbol, value: p.value}));
    if (s.cash > 1) items.push({name: "CASH", value: Math.round(s.cash)});
    mkChart(al, {
      tooltip: {backgroundColor: "#11131c", borderColor: "rgba(255,255,255,.1)", textStyle: {color: "#e8eaf2"},
        formatter: p => `${p.name}: ${p.percent}%`},
      series: [{type: "pie", radius: ["52%", "78%"], padAngle: 1.5,
        itemStyle: {borderRadius: 5, borderColor: "#06070d", borderWidth: 2},
        label: {color: "#8b91a7", fontSize: 10, fontFamily: "'JetBrains Mono',monospace"},
        data: items}]
    });
  }
});

show("ov");
</script>
</body>
</html>
